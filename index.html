<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ISTQB FL Study</title>
<style>
:root {
  --bg:       #0D1117;
  --bg2:      #161B22;
  --bg3:      #21262D;
  --border:   #30363D;
  --navy:     #1F497D;
  --blue:     #2E75B6;
  --lblue:    #1A3A5C;
  --accent:   #58A6FF;
  --green:    #3FB950;
  --lgreen:   #0D2818;
  --red:      #F85149;
  --lred:     #2D1214;
  --orange:   #F0883E;
  --lorange:  #2D1F0D;
  --yellow:   #E3B341;
  --text:     #E6EDF3;
  --text2:    #8B949E;
  --text3:    #6E7681;
  --white:    #FFFFFF;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── SCREENS ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ══════════════════════════════
   SETUP SCREEN
══════════════════════════════ */
#setupScreen {
  display: none;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  background: var(--bg);
}
#setupScreen.active { display: flex; }

.setup-card {
  width: 100%; max-width: 420px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 20px; padding: 40px 36px;
  text-align: center;
}
.setup-logo {
  width: 64px; height: 64px; border-radius: 16px;
  background: var(--navy); margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px;
}
.setup-card h1 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.setup-card p  { font-size: 14px; color: var(--text2); margin-bottom: 28px; line-height: 1.6; }
.setup-label { font-size: 12px; font-weight: 700; color: var(--text2); text-align: left; margin-bottom: 8px; letter-spacing: 0.5px; }
.date-input {
  width: 100%; padding: 14px 16px;
  background: var(--bg3); border: 1.5px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: inherit; font-size: 15px;
  outline: none; margin-bottom: 20px;
  -webkit-appearance: none;
}
.date-input:focus { border-color: var(--accent); }
.start-btn {
  width: 100%; padding: 14px;
  background: var(--accent); color: #0D1117;
  font-family: inherit; font-size: 15px; font-weight: 800;
  border: none; border-radius: 12px; cursor: pointer;
  transition: opacity 0.15s;
}
.start-btn:hover { opacity: 0.88; }

/* ══════════════════════════════
   MAIN SCREEN
══════════════════════════════ */
#mainScreen { padding: 0 0 80px; }

/* Top bar */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo { font-size: 15px; font-weight: 800; color: var(--accent); }
.topbar-dday {
  font-size: 13px; font-weight: 700;
  background: var(--lblue); color: var(--accent);
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--accent);
}

/* Hero */
.hero {
  padding: 28px 20px 20px;
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}
.hero-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 1px; margin-bottom: 4px; }
.hero-sub   { font-size: 22px; font-weight: 900; color: var(--text); margin-bottom: 16px; }

/* Progress bar */
.progress-wrap { margin-bottom: 6px; }
.progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.progress-bar { height: 6px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }

/* Stats row */
.stats-row { display: flex; gap: 10px; padding: 16px 20px; }
.stat-card {
  flex: 1; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 12px; text-align: center;
}
.stat-val { font-size: 22px; font-weight: 900; color: var(--accent); }
.stat-lbl { font-size: 10px; color: var(--text2); margin-top: 3px; }

/* Section title */
.section-title {
  font-size: 12px; font-weight: 700; color: var(--text2);
  letter-spacing: 1px; padding: 20px 20px 10px;
}

/* Day cards */
.day-list { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }

.day-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
  transition: border-color 0.15s;
}
.day-card.unlocked { border-color: var(--border); }
.day-card.completed { border-color: var(--green); }
.day-card.locked { opacity: 0.45; }

.day-card-head {
  padding: 16px 18px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
}
.day-card.locked .day-card-head { cursor: default; }

.day-icon {
  width: 40px; height: 40px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.day-icon.done   { background: var(--lgreen); }
.day-icon.active { background: var(--lblue); }
.day-icon.lock   { background: var(--bg3); }

.day-info { flex: 1; }
.day-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.5px; margin-bottom: 3px; }
.day-title { font-size: 14px; font-weight: 700; color: var(--text); }
.day-chapter { font-size: 11px; color: var(--text2); margin-top: 2px; }

.day-badge {
  font-size: 11px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px; flex-shrink: 0;
}
.badge-done   { background: var(--lgreen); color: var(--green); }
.badge-active { background: var(--lblue);  color: var(--accent); }
.badge-lock   { background: var(--bg3);    color: var(--text3); }

/* ══════════════════════════════
   STUDY SCREEN
══════════════════════════════ */
#studyScreen { padding-bottom: 100px; }

.study-topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px;
}
.back-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--text);
  flex-shrink: 0;
}
.study-topbar-title { font-size: 15px; font-weight: 700; color: var(--text); }

.study-hero {
  padding: 24px 20px 20px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.study-day-label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; }
.study-title { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
.study-chapter { font-size: 13px; color: var(--text2); }

.study-content { padding: 20px; }

/* Content blocks */
.content-section { margin-bottom: 28px; }
.content-h1 {
  font-size: 16px; font-weight: 800; color: var(--text);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
}
.content-h1 span { color: var(--accent); margin-right: 8px; }

.content-h2 {
  font-size: 14px; font-weight: 700; color: var(--accent);
  margin: 16px 0 8px;
}
.content-p {
  font-size: 14px; color: var(--text2); line-height: 1.7;
  margin-bottom: 8px;
}
.content-bullet {
  display: flex; gap: 10px;
  font-size: 13.5px; color: var(--text2); line-height: 1.6;
  margin-bottom: 6px; padding-left: 4px;
}
.content-bullet::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0; margin-top: 8px;
}
.content-bullet b { color: var(--text); }

.callout {
  background: var(--lblue); border: 1px solid var(--accent);
  border-radius: 12px; padding: 14px 16px; margin: 12px 0;
  font-size: 13px; color: var(--accent); line-height: 1.6;
}
.callout b { display: block; margin-bottom: 4px; color: var(--accent); }

/* Table */
.content-table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
.content-table th {
  background: var(--navy); color: var(--white);
  padding: 10px 12px; text-align: left; font-weight: 700;
}
.content-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text2); }
.content-table tr:nth-child(even) td { background: var(--bg3); }
.content-table td b { color: var(--text); }

/* Principle cards */
.principle {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
}
.principle-num { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.5px; }
.principle-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
.principle-desc { font-size: 13px; color: var(--text2); line-height: 1.55; }
.principle-desc b { color: var(--orange); }

/* Complete button */
.complete-wrap {
  position: fixed; bottom: 0; left: 0; right: 0;
  padding: 16px 20px;
  background: rgba(13,17,23,0.96);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
}
.complete-btn {
  width: 100%; padding: 16px;
  background: var(--accent); color: #0D1117;
  font-family: inherit; font-size: 15px; font-weight: 800;
  border: none; border-radius: 14px; cursor: pointer;
}
.complete-btn:disabled { background: var(--green); color: var(--white); cursor: default; }

/* ══════════════════════════════
   QUIZ SCREEN
══════════════════════════════ */
#quizScreen { padding-bottom: 40px; }

.quiz-topbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(13,17,23,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex; align-items: center; gap: 14px;
}
.quiz-progress-bar {
  flex: 1; height: 5px; background: var(--bg3);
  border-radius: 99px; overflow: hidden;
}
.quiz-progress-fill {
  height: 100%; background: var(--accent);
  border-radius: 99px; transition: width 0.3s ease;
}
.quiz-count { font-size: 12px; font-weight: 700; color: var(--text2); flex-shrink: 0; }

.quiz-content { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

.quiz-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.quiz-card-head { padding: 16px 18px 13px; border-bottom: 1px solid var(--bg3); display: flex; gap: 12px; }
.quiz-num {
  width: 27px; height: 27px; border-radius: 8px;
  background: var(--navy); color: var(--white);
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.quiz-q { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.55; }

.quiz-opts { padding: 12px 16px 14px; display: flex; flex-direction: column; gap: 8px; }
.quiz-opt {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--bg3); color: var(--text2);
  font-size: 13px; line-height: 1.45; cursor: pointer;
  transition: border-color 0.12s, background 0.12s;
}
.quiz-opt:hover { border-color: var(--accent); background: var(--lblue); color: var(--text); }
.quiz-opt.disabled { pointer-events: none; }
.quiz-opt.correct { border-color: var(--green); background: var(--lgreen); color: var(--green); font-weight: 700; }
.quiz-opt.wrong   { border-color: var(--red);   background: var(--lred);   color: var(--red);   font-weight: 700; }
.opt-ltr {
  width: 25px; height: 25px; min-width: 25px; border-radius: 7px;
  background: var(--bg2); border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--text3); margin-top: 1px;
}
.quiz-opt.correct .opt-ltr { background: var(--green); border-color: var(--green); color: #fff; }
.quiz-opt.wrong   .opt-ltr { background: var(--red);   border-color: var(--red);   color: #fff; }

.quiz-fb {
  margin: 0 16px 14px; padding: 12px 14px;
  border-radius: 10px; font-size: 13px; line-height: 1.6; display: none;
}
.quiz-fb.sc { display: block; background: var(--lgreen); color: var(--green); border: 1px solid var(--green); }
.quiz-fb.sw { display: block; background: var(--lred);   color: var(--red);   border: 1px solid var(--red); }
.quiz-fb strong { display: block; margin-bottom: 3px; }

/* Result */
.quiz-result {
  margin: 20px; background: var(--bg2);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 36px 24px; text-align: center; display: none;
}
.result-score { font-size: 56px; font-weight: 900; color: var(--accent); line-height: 1; margin: 12px 0 4px; }
.result-pct   { font-size: 14px; color: var(--text2); margin-bottom: 12px; }
.result-msg   { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 20px; line-height: 1.5; }
.result-btns  { display: flex; gap: 10px; }
.result-btn {
  flex: 1; padding: 13px; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  border: none; cursor: pointer;
}
.btn-retry  { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-finish { background: var(--accent); color: #0D1117; }

/* ══════════════════════════════
   EXAM DAY SCREEN
══════════════════════════════ */
#examScreen {
  display: none; min-height: 100vh;
  align-items: center; justify-content: center;
  padding: 24px; text-align: center;
  background: var(--bg);
}
#examScreen.active { display: flex; flex-direction: column; }
.exam-emoji { font-size: 64px; margin-bottom: 20px; }
.exam-title { font-size: 26px; font-weight: 900; color: var(--text); margin-bottom: 10px; }
.exam-sub   { font-size: 15px; color: var(--text2); line-height: 1.7; margin-bottom: 28px; }
.exam-card  {
  background: var(--bg2); border: 1px solid var(--accent);
  border-radius: 20px; padding: 24px 28px; max-width: 400px;
  font-size: 18px; font-weight: 800; color: var(--accent); margin-bottom: 20px;
  line-height: 1.5;
}

/* ══════════════════════════════
   UTILITIES
══════════════════════════════ */
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setupScreen" class="screen">
  <div class="setup-card">
    <div class="setup-logo">&#x1F4DA;</div>
    <h1>ISTQB FL Study</h1>
    <p>시험일을 입력하면<br>남은 기간에 맞게 학습 일정을 자동으로 만들어드려요.</p>
    <div class="setup-label">시험 예정일</div>
    <input type="date" class="date-input" id="examDate">
    <button class="start-btn" onclick="startStudy()">학습 시작하기</button>
  </div>
</div>

<!-- ── MAIN SCREEN ── -->
<div id="mainScreen" class="screen">
  <div class="topbar">
    <div class="topbar-logo">ISTQB FL</div>
    <div class="topbar-dday" id="ddayBadge">D-??</div>
  </div>

  <div class="hero">
    <div class="hero-title">FOUNDATION LEVEL</div>
    <div class="hero-sub" id="heroGreet">안녕하세요!</div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>전체 진도</span>
        <span id="progressText">0 / 11일차</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="statDone">0</div><div class="stat-lbl">완료한 날</div></div>
    <div class="stat-card"><div class="stat-val" id="statLeft">11</div><div class="stat-lbl">남은 날</div></div>
    <div class="stat-card"><div class="stat-val" id="statStreak">0</div><div class="stat-lbl">연속 학습</div></div>
  </div>

  <div class="section-title">CURRICULUM</div>
  <div class="day-list" id="dayList"></div>
</div>

<!-- ── STUDY SCREEN ── -->
<div id="studyScreen" class="screen">
  <div class="study-topbar">
    <div class="back-btn" onclick="goMain()">&#8592;</div>
    <div class="study-topbar-title" id="studyTopTitle"></div>
  </div>
  <div class="study-hero">
    <div class="study-day-label" id="studyDayLabel"></div>
    <div class="study-title"  id="studyTitle"></div>
    <div class="study-chapter" id="studyChapter"></div>
  </div>
  <div class="study-content" id="studyContent"></div>
  <div class="complete-wrap">
    <button class="complete-btn" id="completeBtn" onclick="completeStudy()">다 읽었어요 - 문제 풀기</button>
  </div>
</div>

<!-- ── QUIZ SCREEN ── -->
<div id="quizScreen" class="screen">
  <div class="quiz-topbar">
    <div class="back-btn" onclick="goMain()">&#8592;</div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quizProgFill" style="width:0%"></div></div>
    <div class="quiz-count" id="quizCount">0/0</div>
  </div>
  <div class="quiz-content" id="quizContent"></div>
  <div class="quiz-result" id="quizResult">
    <div style="font-size:36px; margin-bottom:12px;">&#127881;</div>
    <div style="font-size:16px; font-weight:800; color:var(--text);">퀴즈 완료!</div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-pct"   id="resultPct"></div>
    <div class="result-msg"   id="resultMsg"></div>
    <div class="result-btns">
      <button class="result-btn btn-retry"  onclick="retryQuiz()">다시 풀기</button>
      <button class="result-btn btn-finish" onclick="finishDay()">완료하기</button>
    </div>
  </div>
</div>

<!-- ── EXAM DAY SCREEN ── -->
<div id="examScreen" class="screen">
  <div class="exam-emoji">&#127942;</div>
  <div class="exam-title">드디어 시험일이에요!</div>
  <div class="exam-sub">그동안 정말 열심히 준비했어요.<br>지금까지 쌓아온 실력을 믿으세요.</div>
  <div class="exam-card">"준비된 자에게<br>행운은 따라온다"</div>
  <div style="font-size:15px; color:var(--accent); font-weight:800;">ISTQB FL 시험, 건승하세요! &#127775;</div>
</div>

<script>
/* ══════════════════════════════
   DATA
══════════════════════════════ */
var CURRICULUM = [
  { day:1,  title:'소프트웨어 테스팅의 기초',      chapter:'Chapter 1',  available: true },
  { day:2,  title:'소프트웨어 개발 수명주기',       chapter:'Chapter 2',  available: false },
  { day:3,  title:'테스트 레벨과 유형',             chapter:'Chapter 2',  available: false },
  { day:4,  title:'정적 테스팅',                   chapter:'Chapter 3',  available: false },
  { day:5,  title:'테스트 기법 기초',               chapter:'Chapter 4',  available: false },
  { day:6,  title:'블랙박스 테스트 기법',           chapter:'Chapter 4',  available: false },
  { day:7,  title:'화이트박스 & 경험 기반 기법',    chapter:'Chapter 4',  available: false },
  { day:8,  title:'테스트 계획과 추정',             chapter:'Chapter 5',  available: false },
  { day:9,  title:'테스트 모니터링과 제어',          chapter:'Chapter 5',  available: false },
  { day:10, title:'형상관리와 결함 관리',            chapter:'Chapter 5',  available: false },
  { day:11, title:'테스트 지원 도구',               chapter:'Chapter 6',  available: false },
];

/* 1일차 학습 콘텐츠 */
var CONTENT = {
  1: [
    { type:'h1', num:'01', text:'테스팅이란 무엇인가?' },

/* ══════════════════════════════
   STATE
══════════════════════════════ */
var state = {
  examDate: null,
  completed: [],   // 완료한 day 번호들
  streak: 0,
};
var currentDay = 1;
var quizAnswered = 0, quizCorrect = 0;
var LTRS = ['A','B','C','D'];

/* ══════════════════════════════
   INIT
══════════════════════════════ */
window.onload = function() {
  var saved = localStorage.getItem('istqb_state');
  if (saved) {
    try { state = JSON.parse(saved); } catch(e) {}
  }
  var today = new Date();
  today.setHours(0,0,0,0);

  if (state.examDate) {
    var exam = new Date(state.examDate);
    exam.setHours(0,0,0,0);
    var diff = Math.ceil((exam - today) / 86400000);
    if (diff <= 0) { showScreen('examScreen'); return; }
    showScreen('mainScreen');
    renderMain();
  } else {
    var defDate = new Date(today);
    defDate.setDate(defDate.getDate() + 36);
    document.getElementById('examDate').value = defDate.toISOString().split('T')[0];
    showScreen('setupScreen');
  }
};

function save() {
  localStorage.setItem('istqb_state', JSON.stringify(state));
}

/* ══════════════════════════════
   SETUP
══════════════════════════════ */
function startStudy() {
  var val = document.getElementById('examDate').value;
  if (!val) return alert('시험일을 선택해 주세요!');
  var exam = new Date(val);
  var today = new Date(); today.setHours(0,0,0,0);
  if (exam <= today) return alert('시험일은 오늘 이후여야 해요!');
  state.examDate = val;
  state.completed = [];
  state.streak = 0;
  save();
  showScreen('mainScreen');
  renderMain();
}

/* ══════════════════════════════
   MAIN
══════════════════════════════ */
function renderMain() {
  var today = new Date(); today.setHours(0,0,0,0);
  var exam  = new Date(state.examDate); exam.setHours(0,0,0,0);
  var diff  = Math.ceil((exam - today) / 86400000);

  document.getElementById('ddayBadge').textContent = diff > 0 ? 'D-' + diff : 'D-DAY';

  var hour = today.getHours();
  var greet = hour < 12 ? '좋은 아침이에요!' : hour < 18 ? '오늘도 화이팅!' : '오늘 학습 잊지 마세요!';
  document.getElementById('heroGreet').textContent = greet;

  var done = state.completed.length;
  var total = CURRICULUM.length;
  document.getElementById('progressText').textContent = done + ' / ' + total + '일차';
  document.getElementById('progressFill').style.width = Math.round(done/total*100) + '%';
  document.getElementById('statDone').textContent   = done;
  document.getElementById('statLeft').textContent   = total - done;
  document.getElementById('statStreak').textContent = state.streak || 0;

  var list = document.getElementById('dayList');
  list.innerHTML = '';
  CURRICULUM.forEach(function(cur) {
    list.appendChild(makeDayCard(cur));
  });
}

function makeDayCard(cur) {
  var done      = state.completed.indexOf(cur.day) !== -1;
  var available = cur.available;
  var card = document.createElement('div');
  card.className = 'day-card ' + (done ? 'completed' : available ? 'unlocked' : 'locked');

  var head = document.createElement('div');
  head.className = 'day-card-head';
  if ((available || done) && !(!available && !done)) {
    head.onclick = function() { openDay(cur.day); };
  }

  var icon = document.createElement('div');
  icon.className = 'day-icon ' + (done ? 'done' : available ? 'active' : 'lock');
  icon.textContent = done ? '\u2713' : available ? '\u{1F4D6}' : '\uD83D\uDD12';

  var info = document.createElement('div');
  info.className = 'day-info';
  var lbl = document.createElement('div');
  lbl.className = 'day-label';
  lbl.textContent = cur.chapter + '  |  DAY ' + cur.day;
  var title = document.createElement('div');
  title.className = 'day-title';
  title.textContent = cur.title;

  info.appendChild(lbl);
  info.appendChild(title);

  var badge = document.createElement('div');
  badge.className = 'day-badge ' + (done ? 'badge-done' : available ? 'badge-active' : 'badge-lock');
  badge.textContent = done ? '완료' : available ? '학습하기' : '잠금';

  head.appendChild(icon);
  head.appendChild(info);
  head.appendChild(badge);
  card.appendChild(head);
  return card;
}

function openDay(day) {
  var cur = CURRICULUM.find(function(c){ return c.day === day; });
  if (!cur || (!cur.available && state.completed.indexOf(day) === -1)) return;
  currentDay = day;
  document.getElementById('studyTopTitle').textContent = 'Day ' + day;
  document.getElementById('studyDayLabel').textContent = cur.chapter + '  |  DAY ' + day;
  document.getElementById('studyTitle').textContent    = cur.title;
  document.getElementById('studyChapter').textContent  = cur.chapter;

  var isDone = state.completed.indexOf(day) !== -1;
  var btn = document.getElementById('completeBtn');
  btn.textContent = isDone ? '이미 완료한 일차예요' : '다 읽었어요 - 문제 풀기';
  btn.disabled = isDone;

  renderContent(day);
  showScreen('studyScreen');
}

function renderContent(day) {
  var items = CONTENT[day];
  var wrap = document.getElementById('studyContent');
  wrap.innerHTML = '';
  if (!items) {
    wrap.innerHTML = '<p style="color:var(--text2);padding:20px 0;text-align:center;">준비 중인 콘텐츠예요.<br>내일 업데이트될 예정이에요!</p>';
    return;
  }
  items.forEach(function(item) {
    if (item.type === 'h1') {
      var el = document.createElement('div');
      el.className = 'content-h1';
      el.innerHTML = '<span>' + item.num + '</span>' + item.text;
      wrap.appendChild(el);
    } else if (item.type === 'h2') {
      var el = document.createElement('div');
      el.className = 'content-h2';
      el.textContent = item.text;
      wrap.appendChild(el);
    } else if (item.type === 'bullet') {
      var el = document.createElement('div');
      el.className = 'content-bullet';
      el.innerHTML = item.html;
      wrap.appendChild(el);
    } else if (item.type === 'callout') {
      var el = document.createElement('div');
      el.className = 'callout';
      el.innerHTML = '<b>' + item.title + '</b>' + item.text;
      wrap.appendChild(el);
    } else if (item.type === 'table') {
      var t = document.createElement('table');
      t.className = 'content-table';
      var thead = document.createElement('thead');
      var tr = document.createElement('tr');
      item.headers.forEach(function(h) {
        var th = document.createElement('th'); th.textContent = h; tr.appendChild(th);
      });
      thead.appendChild(tr); t.appendChild(thead);
      var tbody = document.createElement('tbody');
      item.rows.forEach(function(row) {
        var tr = document.createElement('tr');
        row.forEach(function(cell) {
          var td = document.createElement('td'); td.innerHTML = cell; tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      t.appendChild(tbody); wrap.appendChild(t);
    } else if (item.type === 'principle') {
      var el = document.createElement('div');
      el.className = 'principle';
      el.innerHTML = '<div class="principle-num">' + item.num + '</div>' +
        '<div class="principle-title">' + item.title + '</div>' +
        '<div class="principle-desc">' + item.desc + '</div>';
      wrap.appendChild(el);
    }
  });
}

function completeStudy() {
  if (QUIZ[currentDay]) {
    startQuiz(currentDay);
  } else {
    finishDay();
  }
}

function goMain() {
  showScreen('mainScreen');
  renderMain();
}

/* ══════════════════════════════
   QUIZ
══════════════════════════════ */
function startQuiz(day) {
  currentDay = day;
  quizAnswered = 0; quizCorrect = 0;
  document.getElementById('quizResult').style.display = 'none';
  renderQuiz(day);
  showScreen('quizScreen');
  updateQuizProgress();
}

function renderQuiz(day) {
  var qs = QUIZ[day];
  var wrap = document.getElementById('quizContent');
  wrap.innerHTML = '';
  document.getElementById('quizResult').style.display = 'none';
  qs.forEach(function(q, i) { wrap.appendChild(makeQuizCard(q, i, qs.length)); });
}

function makeQuizCard(q, i, total) {
  var card = document.createElement('div');
  card.className = 'quiz-card';

  var head = document.createElement('div');
  head.className = 'quiz-card-head';
  var num = document.createElement('div');
  num.className = 'quiz-num';
  num.textContent = i + 1;
  var qt = document.createElement('div');
  qt.className = 'quiz-q';
  qt.textContent = q.q;
  head.appendChild(num); head.appendChild(qt);
  card.appendChild(head);

  var opts = document.createElement('div');
  opts.className = 'quiz-opts';
  q.opts.forEach(function(o, oi) {
    var btn = document.createElement('div');
    btn.className = 'quiz-opt';
    var ltr = document.createElement('div');
    ltr.className = 'opt-ltr';
    ltr.textContent = LTRS[oi];
    var sp = document.createElement('span');
    sp.textContent = o;
    btn.appendChild(ltr); btn.appendChild(sp);
    btn.addEventListener('click', function() { chooseOpt(i, oi, opts, q, total); });
    opts.appendChild(btn);
  });
  card.appendChild(opts);

  var fb = document.createElement('div');
  fb.className = 'quiz-fb';
  fb.id = 'qfb' + i;
  card.appendChild(fb);
  return card;
}

function chooseOpt(qi, oi, optsEl, q, total) {
  var btns = optsEl.querySelectorAll('.quiz-opt');
  if (btns[0].classList.contains('disabled')) return;
  for (var k = 0; k < btns.length; k++) btns[k].classList.add('disabled');
  var isC = oi === q.ans;
  btns[oi].classList.add(isC ? 'correct' : 'wrong');
  if (!isC) btns[q.ans].classList.add('correct');
  var fb = document.getElementById('qfb' + qi);
  fb.className = 'quiz-fb ' + (isC ? 'sc' : 'sw');
  fb.innerHTML = '<strong>' + (isC ? '정답!' : '오답') + '</strong>' + q.ex;
  quizAnswered++;
  if (isC) quizCorrect++;
  updateQuizProgress();
  if (quizAnswered === total) setTimeout(showQuizResult, 600);
}

function updateQuizProgress() {
  var total = QUIZ[currentDay] ? QUIZ[currentDay].length : 1;
  var pct = Math.round(quizAnswered / total * 100);
  document.getElementById('quizProgFill').style.width = pct + '%';
  document.getElementById('quizCount').textContent = quizAnswered + '/' + total;
}

function showQuizResult() {
  var total = QUIZ[currentDay].length;
  var pct = Math.round(quizCorrect / total * 100);
  document.getElementById('resultScore').textContent = quizCorrect + '/' + total;
  document.getElementById('resultPct').textContent   = '정답률 ' + pct + '%';
  document.getElementById('resultMsg').textContent   =
    pct >= 90 ? '완벽해요! 완전히 마스터했어요.' :
    pct >= 70 ? '잘 하고 있어요! 틀린 문제 복습해 보세요.' :
    pct >= 50 ? '조금 더 복습이 필요해요.' :
                '정리본을 다시 읽고 재도전해 보세요!';
  document.getElementById('quizResult').style.display = 'block';
  document.getElementById('quizResult').scrollIntoView({ behavior:'smooth' });
}

function retryQuiz() {
  quizAnswered = 0; quizCorrect = 0;
  renderQuiz(currentDay);
  updateQuizProgress();
  window.scrollTo(0, 0);
}

function finishDay() {
  if (state.completed.indexOf(currentDay) === -1) {
    state.completed.push(currentDay);
    state.streak = (state.streak || 0) + 1;
    // 다음 일차 unlock
    var next = CURRICULUM.find(function(c){ return c.day === currentDay + 1; });
    if (next) next.available = true;
    save();
  }
  goMain();
}

/* ══════════════════════════════
   SCREEN ROUTER
══════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
